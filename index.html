<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consulta de Conta</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#0b1220; color:#e8eefc; margin:0; padding:24px;}
    .wrap{max-width:720px; margin:0 auto;}
    .card{background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.25);}
    .title{font-size:28px; font-weight:700; margin:0 0 6px;}
    .sub{opacity:.85; margin:0 0 18px;}
    label{display:block; font-size:13px; opacity:.9; margin:10px 0 6px;}
    input{width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.06); color:#fff; outline:none;}
    button{margin-top:12px; width:100%; padding:12px 14px; border-radius:12px; border:0; font-weight:700; cursor:pointer; background:#4f7cff; color:white;}
    button:disabled{opacity:.6; cursor:not-allowed;}
    .result{margin-top:16px; display:none;}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;}
    .pill{padding:12px 14px; border-radius:14px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);}
    .k{font-size:12px; opacity:.8;}
    .v{font-size:18px; font-weight:700; margin-top:4px;}
    .err{margin-top:12px; color:#ffb4b4; display:none;}
    .ok{margin-top:12px; color:#b9ffcf; display:none;}
    .footer{opacity:.7; font-size:12px; margin-top:18px;}
    @media (max-width:560px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">Consultar Situação</h1>
      <p class="sub">Insira o seu código para ver Nome, Valor em Dívida e Saldo.</p>

      <label for="codigo">Código</label>
      <input id="codigo" placeholder="Ex: 1234" autocomplete="off" />

      <button id="btn">Consultar</button>

      <div class="err" id="err"></div>
      <div class="ok" id="ok"></div>

      <div class="result" id="result">
        <div class="grid">
          <div class="pill">
            <div class="k">Nome</div>
            <div class="v" id="nome">—</div>
          </div>
          <div class="pill">
            <div class="k">Código</div>
            <div class="v" id="codOut">—</div>
          </div>
          <div class="pill">
            <div class="k">Valor em Dívida</div>
            <div class="v" id="divida">—</div>
          </div>
          <div class="pill">
            <div class="k">Saldo</div>
            <div class="v" id="saldo">—</div>
          </div>
        </div>
      </div>

      <div class="footer">Se não encontrar, confirma se digitou o código corretamente.</div>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzVEPCUmnzLA5a0Zdpzh2aZ7_37_RRILfZ1Jpsb0KcCmCtFEp2NoYa6Vf25POHlNiaw/exec";
  const TOKEN   = "Ascas_2026@x9#Kp!19"; // se você ativar o token

  const $ = (id) => document.getElementById(id);
  const btn = $("btn");

  function money(x){
    if (x === null || x === undefined || x === "") return "—";
    const n = Number(String(x).replace(",", "."));
    if (!Number.isFinite(n)) return String(x);
    return n.toLocaleString("pt-PT", { style:"currency", currency:"MZN" });
  }

  async function consultar(){
    $("err").style.display = "none";
    $("ok").style.display = "none";
    $("result").style.display = "none";

    const codigo = $("codigo").value.trim();
    if (!codigo) {
      $("err").textContent = "Digite o código.";
      $("err").style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Consultando...";

    try {
      const url = new URL(API_URL);
      url.searchParams.set("codigo", codigo);
      if (TOKEN) url.searchParams.set("token", TOKEN);

      const res = await fetch(url.toString());
      const data = await res.json();

      if (!data.ok) {
        $("err").textContent = data.error || "Não foi possível consultar.";
        $("err").style.display = "block";
        return;
      }

      const d = data.data;
      $("nome").textContent = d.nome || "—";
      $("codOut").textContent = d.codigo || "—";
      $("divida").textContent = money(d.valorEmDivida);
      $("saldo").textContent = money(d.saldo);

      $("result").style.display = "block";
      $("ok").textContent = "Consulta realizada com sucesso.";
      $("ok").style.display = "block";

    } catch (e) {
      $("err").textContent = "Erro ao conectar. Tente novamente.";
      $("err").style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "Consultar";
    }
  }

  btn.addEventListener("click", consultar);
  $("codigo").addEventListener("keydown", (e)=>{ if (e.key === "Enter") consultar(); });
</script>
</body>
</html>
